<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Відгуки</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .review-card {
      border: 1px solid #d9e2ec;
      padding: 16px;
      background: #fff;
      margin-bottom: 12px;
    }
    .review-rating {
      font-size: 20px;
      font-weight: 700;
      color: #1f2933;
    }
    .review-stars {
      color: #f59e0b;
      font-size: 18px;
    }
    .review-author {
      font-size: 13px;
      color: #627d98;
      margin-top: 8px;
    }
    .review-comment {
      margin: 8px 0 0;
    }
    .no-reviews {
      color: #627d98;
    }
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <main class="page">
    <nav class="nav">
      <a href="index.html">Товари</a>
      <a href="login.html">Вхід</a>
    </nav>
    <section class="panel">
      <h1 id="pageTitle">Відгуки</h1>
      <p id="message" class="message"></p>
      <div id="reviewList"></div>
      <div class="actions">
        <a id="leaveReviewLink" href="#">Залишити відгук</a>
        <a href="index.html">← Назад до товарів</a>
      </div>
    </section>
  </main>
  <script>
    const API_URL = `${window.location.protocol}//${window.location.hostname}:3000`;

    const params    = new URLSearchParams(window.location.search);
    const productId = params.get('productId');
    if (!productId) window.location.href = 'index.html';

    document.getElementById('leaveReviewLink').href = `review.html?productId=${productId}`;

    const escapeHtml = (value) => String(value)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');

    const renderStars = (rating) => '★'.repeat(rating) + '☆'.repeat(5 - rating);

    const loadReviews = async () => {
      const message = document.getElementById('message');
      const list    = document.getElementById('reviewList');

      const [productRes, reviewsRes] = await Promise.all([
        fetch(`${API_URL}/api/products/${productId}`, { credentials: 'include' }),
        fetch(`${API_URL}/api/products/${productId}/reviews`, { credentials: 'include' })
      ]);

      if (productRes.ok) {
        const productData = await productRes.json();
        document.getElementById('pageTitle').textContent =
          `Відгуки: ${escapeHtml(productData.data.product.name)}`;
      }

      const data = await reviewsRes.json();

      if (!reviewsRes.ok) {
        message.textContent = data.message;
        message.className = 'message error';
        return;
      }

      const reviews = data.data.reviews;

      if (!reviews.length) {
        list.innerHTML = '<p class="no-reviews">Відгуків ще немає. Будьте першим!</p>';
        return;
      }

      list.innerHTML = reviews.map((r) => `
        <div class="review-card">
          <div class="review-rating">
            <span class="review-stars">${renderStars(r.rating)}</span>
            ${r.rating}/5
          </div>
          <p class="review-comment">${escapeHtml(r.comment)}</p>
          <p class="review-author">
            ${escapeHtml(r.user?.name || 'Анонім')}
            · ${new Date(r.createdAt).toLocaleDateString('uk-UA')}
          </p>
        </div>
      `).join('');
    };

    loadReviews();
  </script>
</body>
</html>
