<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Реєстрація</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <nav class="nav">
      <a href="index.html">Товари</a>
      <a href="login.html">Вхід</a>
    </nav>
    <section class="panel">
      <h1>Реєстрація</h1>
      <div id="serverErrors"></div>
      <form id="registerForm">
        <div class="field">
          <label for="name">Ім'я</label>
          <input type="text" id="name" required>
          <span class="field-error" id="nameError"></span>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required>
          <span class="field-error" id="emailError"></span>
        </div>
        <div class="field">
          <label for="password">Пароль</label>
          <input type="password" id="password" required>
          <span class="field-error" id="passwordError"></span>
        </div>
        <div class="field">
          <label for="confirmPassword">Підтвердження пароля</label>
          <input type="password" id="confirmPassword" required>
          <span class="field-error" id="confirmError"></span>
        </div>
        <button type="submit" id="submitBtn" disabled>Зареєструватися</button>
      </form>
    </section>
  </main>
  <script>
    const API_URL = window.location.port ? `${window.location.protocol}//${window.location.hostname}:3000` : window.location.origin;

    const nameInput        = document.getElementById('name');
    const emailInput       = document.getElementById('email');
    const passwordInput    = document.getElementById('password');
    const confirmInput     = document.getElementById('confirmPassword');
    const submitBtn        = document.getElementById('submitBtn');
    const serverErrors     = document.getElementById('serverErrors');

    function setError(input, errorId, message) {
      input.classList.add('error');
      input.classList.remove('valid');
      document.getElementById(errorId).textContent = message;
    }

    function setValid(input, errorId) {
      input.classList.remove('error');
      input.classList.add('valid');
      document.getElementById(errorId).textContent = '';
    }

    function clearState(input, errorId) {
      input.classList.remove('error', 'valid');
      document.getElementById(errorId).textContent = '';
    }

    function validateAll() {
      let valid = true;

      if (nameInput.value.length === 0) {
        clearState(nameInput, 'nameError');
        valid = false;
      } else if (nameInput.value.trim().length < 2) {
        setError(nameInput, 'nameError', "Ім'я має містити мінімум 2 символи");
        valid = false;
      } else {
        setValid(nameInput, 'nameError');
      }

      if (emailInput.value.length === 0) {
        clearState(emailInput, 'emailError');
        valid = false;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value)) {
        setError(emailInput, 'emailError', 'Введіть коректний email');
        valid = false;
      } else {
        setValid(emailInput, 'emailError');
      }

      if (passwordInput.value.length === 0) {
        clearState(passwordInput, 'passwordError');
        valid = false;
      } else if (passwordInput.value.length < 8) {
        setError(passwordInput, 'passwordError', 'Пароль має містити мінімум 8 символів');
        valid = false;
      } else {
        setValid(passwordInput, 'passwordError');
      }

      if (confirmInput.value.length === 0) {
        clearState(confirmInput, 'confirmError');
        valid = false;
      } else if (confirmInput.value !== passwordInput.value) {
        setError(confirmInput, 'confirmError', 'Паролі не збігаються');
        valid = false;
      } else {
        setValid(confirmInput, 'confirmError');
      }

      submitBtn.disabled = !valid;
    }

    [nameInput, emailInput, passwordInput, confirmInput]
      .forEach(input => input.addEventListener('input', validateAll));

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      serverErrors.innerHTML = '';

      const response = await fetch(`${API_URL}/api/auth/register`, {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: nameInput.value,
          email: emailInput.value,
          password: passwordInput.value,
          confirmPassword: confirmInput.value
        })
      });

      const data = await response.json();

      if (!response.ok) {
        const msgs = data.data?.errors?.map(e => e.msg) || [data.message];
        serverErrors.innerHTML = msgs.map(m => `<p>${m}</p>`).join('');
        return;
      }

      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
